name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Set up Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Run Black (Formatter)
        run: black backend frontend run.py tests --check

      - name: Run Pylint (Linter)
        run: |
          pylint backend/app run.py --output-format=text --fail-under=9 > pylint-report.txt || true

      - name: Run Flake8 (Linter)
        run: |
          flake8 backend frontend run.py tests --output-file=flake8-report.txt || true

      - name: Build Frontend
        run: python frontend/build_frontend.py

      - name: Run Backend and Frontend Tests with Coverage
        run: pytest

      - name: Run Acceptance Tests
        env:
          APP_BASE_URL: http://localhost:8000
          TASK_API_BASE_URL: http://localhost:5000
          BACKEND_PORT: 5000
          FRONTEND_PORT: 8000
          FLASK_DEBUG: false
          FLASK_USE_RELOADER: false
        run: |
          python backend/app/main.py &
          python frontend/serve_frontend.py &
          sleep 10
          pytest tests/test_acceptance_app.py --html=acceptance_report.html --self-contained-html

      - name: Upload Test Reports Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            htmlcov/
            report.html
            acceptance_report.html
            coverage.xml
            pylint-report.txt
            flake8-report.txt

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: Set up QEMU
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image locally for smoke test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build -t local/task-management-backend:ci -f ./backend/Dockerfile .

      - name: Run backend container smoke test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run -d --name backend-smoke -p 5000:5000 local/task-management-backend:ci
          sleep 10
          curl --fail http://localhost:5000/health
          docker stop backend-smoke
          docker rm backend-smoke

      - name: Build frontend image locally for smoke test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build -t local/task-management-frontend:ci -f ./frontend/Dockerfile .

      - name: Run frontend container smoke test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run -d --name frontend-smoke -p 8000:8000 local/task-management-frontend:ci
          sleep 10
          curl --fail http://localhost:8000
          docker stop frontend-smoke
          docker rm frontend-smoke

      - name: Run Trivy scan on backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/task-management-backend:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Run Trivy scan on frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/task-management-frontend:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build and push backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/task-management-backend:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/task-management-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/task-management-frontend:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/task-management-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max