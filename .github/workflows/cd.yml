name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

jobs:

  prepare:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: python frontend/build_frontend.py
      - run: pytest


  security-scan:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: darango378/task-management-backend:latest
          #severity: CRITICAL,HIGH
          severity: CRITICAL
          exit-code: '1'

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: darango378/task-management-frontend:latest
          #severity: CRITICAL,HIGH
          severity: CRITICAL
          exit-code: '1'


  deploy-staging:
    runs-on: ubuntu-latest
    needs: security-scan

    outputs:
      url: ${{ steps.staging_url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=todoapp/staging/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="environment_name=staging" \
            -var="backend_docker_image_uri=darango378/task-management-backend:latest" \
            -var="frontend_docker_image_uri=darango378/task-management-frontend:latest" \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var='subnet_ids=${{ vars.SUBNET_IDS }}'
            #-var="subnet_ids=${{ vars.SUBNET_IDS }}" \
            -var="lab_role_arn=${{ vars.LAB_ROLE_ARN }}" \
            -var="backend_public_ip=${{ vars.BACKEND_PUBLIC_IP }}" \
            -var="secret_key=${{ secrets.SECRET_KEY }}"

      - run: sleep 60

      - id: staging_url
        working-directory: infra
        run: echo "url=$(terraform output -raw frontend_alb_url)" >> $GITHUB_OUTPUT


  test-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: |
          export APP_BASE_URL=${{ needs.deploy-staging.outputs.url }}
          pytest tests/test_acceptance_app.py

      - run: |
          curl -X POST ${{ needs.deploy-staging.outputs.url }}tasks \
          -H "Content-Type: application/json" \
          -d '{"title":"pipeline-test","description":"cd","status":"pending"}'


  deploy-production:
    runs-on: ubuntu-latest
    needs: test-staging
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=todoapp/production/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_DEFAULT_REGION }}"

      - working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="environment_name=production" \
            -var="backend_docker_image_uri=darango378/task-management-backend:latest" \
            -var="frontend_docker_image_uri=darango378/task-management-frontend:latest" \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="subnet_ids=${{ vars.SUBNET_IDS }}" \
            -var="lab_role_arn=${{ vars.LAB_ROLE_ARN }}" \
            -var="backend_public_ip=${{ vars.BACKEND_PUBLIC_IP }}" \
            -var="secret_key=${{ secrets.SECRET_KEY }}"

      - run: sleep 60

      - id: prod_url
        working-directory: infra
        run: echo "url=$(terraform output -raw frontend_alb_url)" >> $GITHUB_OUTPUT

      - run: curl ${{ steps.prod_url.outputs.url }}tasks


  rollback:
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - run: echo "Rollback would go here"