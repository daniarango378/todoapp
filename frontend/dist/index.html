<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management App</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Task Management App</p>
          <h1>Organize work with a clean Kanban flow.</h1>
          <p class="hero-copy">
            Create, edit and move tasks between stages while the frontend consumes a
            decoupled Flask API.
          </p>
        </div>
        <div class="hero-card">
          <span>API Endpoint</span>
          <strong id="api-base-url">http://localhost:5000</strong>
        </div>
      </section>

      <section class="panel form-panel">
        <div class="section-heading">
          <h2 id="form-title">Create Task</h2>
          <button id="cancel-edit-btn" class="ghost-btn hidden" type="button">
            Cancel Edit
          </button>
        </div>

        <form id="task-form">
          <input type="hidden" id="task-id" />

          <label for="title">Title</label>
          <input id="title" name="title" type="text" placeholder="Task title" required />

          <label for="description">Description</label>
          <textarea
            id="description"
            name="description"
            rows="4"
            placeholder="Task details"
          ></textarea>

          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>

          <button id="submit-btn" class="primary-btn" type="submit">Save Task</button>
        </form>

        <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
      </section>

      <section class="board">
        <div class="section-heading">
          <h2>Tasks Board</h2>
          <button id="refresh-btn" class="ghost-btn" type="button">Refresh</button>
        </div>

        <div class="columns">
          <section class="panel board-column">
            <div class="column-header">
              <h3>Pending</h3>
              <span id="count-pending">0</span>
            </div>
            <div id="pending-tasks" class="task-list"></div>
          </section>

          <section class="panel board-column">
            <div class="column-header">
              <h3>In Progress</h3>
              <span id="count-in_progress">0</span>
            </div>
            <div id="in_progress-tasks" class="task-list"></div>
          </section>

          <section class="panel board-column">
            <div class="column-header">
              <h3>Done</h3>
              <span id="count-done">0</span>
            </div>
            <div id="done-tasks" class="task-list"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="./js/runtime-config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
